bundle:
  name: referra-app

variables:
  genie_space_id:
    description: Default Genie Space ID
  genie_space_name:
    description: Genie Space display name
  warehouse_id:
    description: SQL Warehouse ID
  lakebase_branch:
    description: Existing Lakebase branch resource name
  lakebase_database:
    description: Existing Lakebase database resource name

resources:
  apps:
    app:
      name: 'referra-app'
      description: 'Conversational analytics app powered by Databricks AI/BI Genie'
      source_code_path: ./
      user_api_scopes:
        - dashboards.genie

      # The resources which this app has access to.
      resources:
        - name: genie-space
          genie_space:
            name: ${var.genie_space_name}
            space_id: ${var.genie_space_id}
            permission: CAN_RUN
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: postgres
          postgres:
            branch: ${var.lakebase_branch}
            database: ${var.lakebase_database}
            permission: CAN_CONNECT_AND_CREATE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-4745c1e0-06b0.cloud.databricks.com

    variables:
      genie_space_id: 01f16999d12a176991615aabc8dc1d8c
      genie_space_name: India Health and Facility Data
      warehouse_id: ff45ecc135192f6f
      lakebase_branch: projects/referra-districts/branches/production
      lakebase_database: projects/referra-districts/branches/production/databases/databricks-postgres
